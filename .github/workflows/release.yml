name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Creates the tag on this commit if missing."
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desktop-linux:
    name: Build & publish Linux desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Ensure Electron binary
        run: |
          ELECTRON_DIR=$(find node_modules/.pnpm -path '*/electron@*/node_modules/electron' -type d | head -1)
          if [ -z "$ELECTRON_DIR" ]; then
            echo "electron package not found"
            exit 1
          fi
          if [ ! -x "$ELECTRON_DIR/dist/electron" ]; then
            (cd "$ELECTRON_DIR" && node install.js)
          fi
          "$ELECTRON_DIR/dist/electron" --version

      - name: Build web UI
        run: pnpm --filter web build

      - name: Package Electron (AppImage)
        run: |
          pnpm --filter desktop build:electron
          pnpm --filter desktop exec electron-builder --linux AppImage
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          ls -la apps/desktop/release/*.AppImage
          APPIMAGE=$(ls apps/desktop/release/*.AppImage | head -1)
          echo "appimage=$APPIMAGE" >> "$GITHUB_OUTPUT"
          echo "appimage_name=$(basename "$APPIMAGE")" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyra-linux-appimage
          path: apps/desktop/release/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Lyra ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: apps/desktop/release/*.AppImage
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  eas-android-preview:
    name: EAS Android preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check EXPO_TOKEN
        id: expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN not configured — skipping EAS build."
            echo "Create a token at https://expo.dev/settings/access-tokens"
            echo "then: gh secret set EXPO_TOKEN"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.expo.outputs.present == 'true'

      - uses: actions/setup-node@v4
        if: steps.expo.outputs.present == 'true'
        with:
          node-version: 22
          cache: pnpm

      - if: steps.expo.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        if: steps.expo.outputs.present == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start EAS Android preview build
        if: steps.expo.outputs.present == 'true'
        working-directory: apps/native
        run: eas build --platform android --profile preview --non-interactive --no-wait
