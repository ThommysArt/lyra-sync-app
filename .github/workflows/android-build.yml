name: Android Build

# Local-style APK on GitHub Actions (no EAS). Upload as a workflow artifact.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: preview
        type: choice
        options:
          - dev
          - preview
  push:
    tags:
      - "v*"

concurrency:
  group: android-build-${{ github.ref }}-${{ github.event.inputs.profile || 'preview' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  EXPO_NO_TELEMETRY: "1"
  # Device ABIs only — skip x86 emulators to cut CI time/size
  ORG_GRADLE_PROJECT_reactNativeArchitectures: armeabi-v7a,arm64-v8a
  # Applied to Gradle client + worker JVMs (D8/R8). Expo default Metaspace 512m OOMs.
  JAVA_TOOL_OPTIONS: "-Xmx6g -XX:MaxMetaspaceSize=2g -XX:ReservedCodeCacheSize=512m"
jobs:
  apk:
    name: Android ${{ github.event.inputs.profile || 'preview' }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - run: pnpm install --frozen-lockfile

      - name: Resolve profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ inputs.profile }}"
          else
            PROFILE="preview"
          fi
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          if [ "$PROFILE" = "dev" ]; then
            echo "gradle_task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_glob=apps/native/android/app/build/outputs/apk/debug/*.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=lyra-android-dev" >> "$GITHUB_OUTPUT"
            echo "lyra_env=development" >> "$GITHUB_OUTPUT"
          else
            echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_glob=apps/native/android/app/build/outputs/apk/release/*.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=lyra-android-preview" >> "$GITHUB_OUTPUT"
            echo "lyra_env=preview" >> "$GITHUB_OUTPUT"
          fi

      # android/ is gitignored — generate on the runner via the same script as local.
      - name: Generate native Android project
        working-directory: apps/native
        run: pnpm run prebuild
        env:
          EXPO_PUBLIC_LYRA_ENV: ${{ steps.profile.outputs.lyra_env }}
          EXPO_PUBLIC_SERVER_URL: https://lyra.app

      # prebuild overwrites gradle.properties — re-apply CI memory after it.
      - name: Raise Gradle memory for CI
        working-directory: apps/native/android
        run: |
          # Replace default Expo jvmargs (often 2g / 512m Metaspace → OOM on D8 merge)
          if grep -q '^org.gradle.jvmargs=' gradle.properties; then
            sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -XX:ReservedCodeCacheSize=512m -Dfile.encoding=UTF-8/' gradle.properties
          else
            echo 'org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -XX:ReservedCodeCacheSize=512m -Dfile.encoding=UTF-8' >> gradle.properties
          fi
          {
            echo 'org.gradle.workers.max=2'
            echo 'org.gradle.parallel=false'
            echo 'org.gradle.daemon=false'
            echo 'kotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=1g'
          } >> gradle.properties
          echo "--- gradle.properties (memory) ---"
          grep -E 'jvmargs|workers|parallel|daemon' gradle.properties || true

      - name: Build APK
        working-directory: apps/native/android
        run: |
          chmod +x gradlew
          # Stop any leftover daemon; build single-threaded enough to avoid Metaspace blowups
          ./gradlew --stop || true
          ./gradlew ${{ steps.profile.outputs.gradle_task }} \
            --no-daemon \
            --max-workers=2 \
            -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=2g -XX:ReservedCodeCacheSize=512m"
        env:
          EXPO_PUBLIC_LYRA_ENV: ${{ steps.profile.outputs.lyra_env }}
          EXPO_PUBLIC_SERVER_URL: https://lyra.app
          JAVA_TOOL_OPTIONS: "-Xmx6g -XX:MaxMetaspaceSize=2g"

      - name: List APKs
        run: find apps/native/android/app/build/outputs/apk -name '*.apk' -ls

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.profile.outputs.artifact_name }}
          path: ${{ steps.profile.outputs.apk_glob }}
          if-no-files-found: error
          retention-days: 30
