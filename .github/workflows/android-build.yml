name: Android Build

# Local-style APK on GitHub Actions (no EAS). Upload as a workflow artifact.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: preview
        type: choice
        options:
          - dev
          - preview
  push:
    tags:
      - "v*"

concurrency:
  group: android-build-${{ github.ref }}-${{ github.event.inputs.profile || 'preview' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  EXPO_NO_TELEMETRY: "1"
  # Device ABIs only — skip x86 emulators to cut CI time/size
  ORG_GRADLE_PROJECT_reactNativeArchitectures: armeabi-v7a,arm64-v8a
  # Applied to Gradle client + worker JVMs (D8/R8). Expo default Metaspace 512m OOMs.
  JAVA_TOOL_OPTIONS: "-Xmx6g -XX:MaxMetaspaceSize=2g -XX:ReservedCodeCacheSize=512m"
jobs:
  apk:
    name: Android ${{ github.event.inputs.profile || 'preview' }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - run: pnpm install --frozen-lockfile

      - name: Resolve profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ inputs.profile }}"
          else
            PROFILE="preview"
          fi
          VERSION=$(node -p "require('./apps/native/package.json').version")
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$PROFILE" = "dev" ]; then
            echo "app_variant=development" >> "$GITHUB_OUTPUT"
            echo "variant_slug=dev" >> "$GITHUB_OUTPUT"
            echo "build_script=build:dev" >> "$GITHUB_OUTPUT"
            echo "lyra_env=development" >> "$GITHUB_OUTPUT"
            echo "artifact_name=lyra-${VERSION}-dev" >> "$GITHUB_OUTPUT"
          else
            echo "app_variant=preview" >> "$GITHUB_OUTPUT"
            echo "variant_slug=preview" >> "$GITHUB_OUTPUT"
            echo "build_script=build:preview" >> "$GITHUB_OUTPUT"
            echo "lyra_env=preview" >> "$GITHUB_OUTPUT"
            echo "artifact_name=lyra-${VERSION}-preview" >> "$GITHUB_OUTPUT"
          fi

      # Variant prebuild + gradle + versioned APK (apps/native/dist/lyra-VERSION-VARIANT.apk)
      - name: Build versioned APK
        working-directory: apps/native
        run: pnpm run ${{ steps.profile.outputs.build_script }}
        env:
          APP_VARIANT: ${{ steps.profile.outputs.app_variant }}
          EXPO_PUBLIC_LYRA_ENV: ${{ steps.profile.outputs.lyra_env }}
          EXPO_PUBLIC_SERVER_URL: https://lyra.app
          JAVA_TOOL_OPTIONS: "-Xmx6g -XX:MaxMetaspaceSize=2g"

      - name: List APKs
        run: |
          find apps/native/dist apps/native/android/app/build/outputs/apk -name '*.apk' -ls 2>/dev/null || true
          ls -la "apps/native/dist/lyra-${{ steps.profile.outputs.version }}-${{ steps.profile.outputs.variant_slug }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.profile.outputs.artifact_name }}
          path: apps/native/dist/lyra-${{ steps.profile.outputs.version }}-${{ steps.profile.outputs.variant_slug }}.apk
          if-no-files-found: error
          retention-days: 30
